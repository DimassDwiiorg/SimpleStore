<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dimzstore | Premium Store</title>
    
    <!-- Favicon dengan Cache Busting biar langsung berubah di kolom URL Chrome -->
    <link rel="icon" type="image/png" href="PASTE_LINK_LOGO_LU_DI_SINI?v=2">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background-color: #070a13; /* Warna dasar Midnight Blue super gelap */
            color: #ffffff;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #16223f;
            margin-bottom: 4px;
        }
        .logo-text {
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: 1.5px;
    text-decoration: none;
    /* Efek gradasi warna biru neon ke cyan */
    background: linear-gradient(135deg, #0052ff 0%, #00d2ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: transform 0.2s;
    display: inline-block;
}

.logo-text:hover {
    transform: scale(1.03); /* Efek membesar dikit pas disentuh/di-hover */
}
        
        .admin-link {
            color: #53699a;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .admin-link:hover {
            color: #00d2ff;
        }
        .hero {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(135deg, #0f172a 0%, #070a13 100%);
            border-radius: 16px;
            margin-bottom: 40px;
            border: 1px solid #1e293b;
            box-shadow: 0 4px 30px rgba(0, 82, 255, 0.05); /* Glow biru tipis elegan */
        }
        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #0084ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            color: #64748b;
            font-size: 1rem;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            border-color: #0052ff;
            box-shadow: 0 10px 25px rgba(0, 82, 255, 0.15);
        }
        .product-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: #1e293b;
        }
        .product-info {
            padding: 20px;
        }
        .product-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }
        .product-price {
            color: #00d2ff; /* Harga warna biru cyan terang biar kontras */
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .buy-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0052ff 0%, #00d2ff 100%);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
            box-shadow: 0 4px 15px rgba(0, 82, 255, 0.3);
        }
        .buy-btn:hover {
            opacity: 0.9;
        }
        footer {
            text-align: center;
            padding: 40px 0;
            margin-top: 60px;
            color: #334155;
            font-size: 0.85rem;
            border-top: 1px solid #16223f;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-text">DIMZSTORE</a>
        <a href="admin.html" class="admin-link">Kelola Toko (Admin)</a>
    </header>

    <section class="hero">
        <h1>CURATED PREMIUM ITEMS</h1>
        <p>Eksklusif, Terbatas, Kualitas Bintang Lima ala Dimas.</p>
    </section>

    <main class="products-grid" id="products-container">
        <!-- Produk otomatis tersinkron dari Firebase -->
    </main>

    <footer>
        &copy; 2026 dimzstore. Built by Dimas Dwi S. All Rights Reserved.
    </footer>

    <!-- Firebase SDK V8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBReOgcdc3ifJl757LFmJrX0n7Vf5-E0WA",
            authDomain: "dimzstore-21d40.firebaseapp.com",
            databaseURL: "https://dimzstore-21d40-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "dimzstore-21d40",
            storageBucket: "dimzstore-21d40.firebasestorage.app",
            messagingSenderId: "888836931835",
            appId: "1:888836931835:web:2759e1806566131f96f05e"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const container = document.getElementById('products-container');

        database.ref('products').on('value', (snapshot) => {
            container.innerHTML = '';
            const data = snapshot.val();
            
            if (!data) {
                container.innerHTML = '<p style="color:#475569; text-align:center; grid-column: 1/-1; padding: 40px 0;">Belum ada produk aktif nih lek. Silakan upload via halaman admin.</p>';
                return;
            }

            Object.keys(data).forEach((key) => {
                const p = data[key];
                const formattedPrice = "Rp " + parseInt(p.price).toLocaleString('id-ID');
                const waLink = `https://wa.me/628XXXXXXXXXX?text=Halo%20Dim!%20Gw%20mau%20order%20*${encodeURIComponent(p.name)}*%20dengan%20harga%20*${formattedPrice}*`;

                container.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" class="product-img" alt="${p.name}">
                        <div class="product-info">
                            <div class="product-title">${p.name}</div>
                            <div class="product-price">${formattedPrice}</div>
                            <a href="${waLink}" target="_blank" class="buy-btn">BUY NOW</a>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
